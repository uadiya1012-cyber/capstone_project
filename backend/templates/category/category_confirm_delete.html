{% extends 'base.html' %} {% block content %}
<h1>Delete Category</h1>
<form method="post">
  {% csrf_token %}
  <p>Are you sure you want to delete '{{ category.name }}'?</p>
  <button type="submit">Yes, delete</button>
  <a href="{% url 'category:category_list' %}">Cancel</a>
</form>
{% endblock %}
