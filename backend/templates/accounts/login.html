{% extends 'base.html' %} {% block content %}
<div class="login-container">
  <h2>Login</h2>
  <form method="post">
    {% csrf_token %} {{ form.as_p }}
    <button type="submit">Login</button>
  </form>
  <p>
    Need an account?
    <a href="{% url 'register' %}">Register Here</a>
  </p>
</div>

{% endblock %}
